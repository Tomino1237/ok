<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>3D Tlačiareň - Online Prehliadač</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: var(--bg); color: var(--text); }
        
        /* Horná lišta */
        header { background: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; }
        header h1 { margin: 0; font-size: 1.5rem; cursor: pointer; color: var(--primary); }
        .search-box { background: #f1f5f9; border: none; padding: 0.6rem 1rem; border-radius: 8px; width: 300px; outline: none; }

        /* Hlavný obsah */
        .container { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 280px; background: white; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .sidebar h2 { font-size: 1rem; padding: 1.5rem 1.5rem 0.5rem; margin: 0; opacity: 0.7; }
        #modelList { flex: 1; overflow-y: auto; padding: 1rem; }
        .model-card { background: #f1f5f9; padding: 1rem; border-radius: 10px; margin-bottom: 0.8rem; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
        .model-card:hover { transform: translateY(-2px); border-color: var(--primary); background: #eff6ff; }
        .model-card p { margin: 0; font-weight: 600; font-size: 0.9rem; }

        /* Preview zóna */
        .preview-pane { flex: 1; position: relative; display: flex; flex-direction: column; padding: 20px; }
        model-viewer { width: 100%; flex: 1; background: radial-gradient(#ffffff, #e2e8f0); border-radius: 20px; }
        
        /* Nahrávacia zóna */
        .upload-bar { background: white; margin-top: 20px; padding: 1.5rem; border-radius: 15px; border: 2px dashed #cbd5e1; display: flex; justify-content: space-between; align-items: center; }
        .btn-order { background: var(--primary); color: white; border: none; padding: 0.8rem 2rem; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <h1 onclick="location.reload()">3D HUB SK</h1>
        <input type="text" class="search-box" id="search" placeholder="Hľadať v ponuke..." onkeyup="filterModels()">
    </header>

    <div class="container">
        <aside class="sidebar">
            <h2>DOSTUPNÉ MODELY</h2>
            <div id="modelList"></div>
        </aside>

        <main class="preview-pane">
            <model-viewer id="view" src="" camera-controls auto-rotate shadow-intensity="1"></model-viewer>
            
            <div class="upload-bar">
                <div>
                    <strong>Chceš vytlačiť vlastné?</strong><br>
                    <input type="file" id="up" accept=".glb">
                </div>
                <button class="btn-order" onclick="alert('Objednávka odoslaná na váš e-mail!')">ODOSLAŤ NA TLAČ</button>
            </div>
        </main>
    </div>

    <script>
        const modely = [
            { meno: "Astronaut v skafandri", url: "https://modelviewer.dev/shared-assets/models/Astronaut.glb" },
            { meno: "Robot Helper", url: "https://modelviewer.dev/shared-assets/models/RobotExpressive.glb" },
            { meno: "Drevená stolička", url: "https://modelviewer.dev/shared-assets/models/Chair.glb" }
        ];

        const list = document.getElementById('modelList');
        const view = document.getElementById('view');

        function render(items) {
            list.innerHTML = "";
            items.forEach(m => {
                const card = document.createElement('div');
                card.className = 'model-card';
                card.innerHTML = `<p>${m.meno}</p>`;
                card.onclick = () => view.src = m.url;
                list.appendChild(card);
            });
        }

        function filterModels() {
            const query = document.getElementById('search').value.toLowerCase();
            render(modely.filter(m => m.meno.toLowerCase().includes(query)));
        }

        document.getElementById('up').onchange = (e) => {
            const f = e.target.files[0];
            if(f) view.src = URL.createObjectURL(f);
        };

        render(modely);
    </script>
</body>
</html>
