<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>3D HUB SK - Bez limitov</title>
    <script src="https://ucarecdn.com/libs/widget/3.x/uploadcare.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        .uploadcare--widget { margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { background: #5865F2; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🚀 3D Objednávka</h2>
        <p>Nahraj model (aj veľké súbory)</p>
        
        <input type="hidden" role="uploadcare-uploader" name="my_file" id="uploader" 
               data-public-key="2113eada7cd60c81c6dc" 
               data-tabs="file">

        <input type="email" id="email" placeholder="Tvoj e-mail">
        <button id="sendBtn" class="btn">ODOSLAŤ NA DISCORD</button>
    </div>

    <script>
        const DISCORD_URL = "https://discord.com/api/webhooks/1494401052605284552/KsxGcDjMXQZcAgZafiTlXkgQmYbfC61AAha0nQ5h2rqJPIL7waUlqlIpeM8HkaHmpvBR";

        const btn = document.getElementById('sendBtn');
        const widget = uploadcare.Widget('#uploader');

        btn.onclick = async () => {
            const email = document.getElementById('email').value;
            const fileInfo = widget.value(); // Získa info o nahratom súbore

            if (!email.includes('@') || !fileInfo) {
                return alert("Zadaj email a počkaj na nahranie súboru!");
            }

            btn.disabled = true;
            btn.innerText = "Odosielam info...";

            // Keď widget dokončí nahrávanie, dostaneme URL
            fileInfo.done(async (info) => {
                const message = {
                    content: `🔥 **MÁŠ NOVÚ OBJEDNÁVKU!**\n**Zákazník:** ${email}\n**Model:** ${info.name}\n**ODKAZ NA STIAHNUTIE:** ${info.originalUrl}`
                };

                const res = await fetch(DISCORD_URL, {
                    method: "POST",
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(message)
                });

                if (res.ok) {
                    alert("✅ Objednávka prijatá! Odkaz je na Discorde.");
                    location.reload();
                } else {
                    alert("❌ Chyba pri spojení s Discordom.");
                    btn.disabled = false;
                }
            });
        };
    </script>
</body>
</html>
