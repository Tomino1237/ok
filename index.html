<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D HUB SK | Objednávka</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@uploadcare/file-uploader@1/web/uc-file-uploader-minimal.min.css">
    <script type="module">
        import * as UC from 'https://cdn.jsdelivr.net/npm/@uploadcare/file-uploader@1/web/uc-file-uploader-minimal.min.js';
        UC.defineComponents(UC);
    </script>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        :root { --primary: #5865F2; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: white; padding: 1rem 2rem; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        header h1 { margin: 0; font-size: 1.3rem; color: var(--primary); }

        .container { display: flex; flex: 1; overflow: hidden; }
        
        /* Katalóg vľavo */
        .sidebar { width: 250px; background: white; border-right: 1px solid #ddd; padding: 20px; overflow-y: auto; }
        .model-item { padding: 10px; background: #f8f9fa; border-radius: 8px; margin-bottom: 10px; cursor: pointer; border: 1px solid transparent; }
        .model-item:hover { border-color: var(--primary); }

        /* Hlavná plocha */
        .main-content { flex: 1; display: flex; flex-direction: column; padding: 20px; gap: 20px; }
        
        /* Náhľad */
        .viewer-box { flex: 1; background: white; border-radius: 15px; border: 1px solid #ddd; overflow: hidden; }
        model-viewer { width: 100%; height: 100%; }

        /* Spodný ovládací panel */
        .controls { background: white; padding: 20px; border-radius: 15px; border: 1px solid #ddd; display: flex; gap: 20px; align-items: center; }
        
        /* Úprava Uploadcare aby ladil */
        .upload-wrapper { flex: 1; }
        uc-file-uploader-minimal {
            --uc-primary-color: var(--primary);
        }

        .action-box { display: flex; flex-direction: column; gap: 10px; min-width: 250px; }
        input[type="email"] { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        .btn-send { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-send:disabled { background: #ccc; }
    </style>
</head>
<body>

    <header>
        <h1>3D HUB SK</h1>
        <div style="color: #666; font-size: 0.9rem;">Online Objednávka</div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <h3>Katalóg</h3>
            <div class="model-item" onclick="document.getElementById('viewer').src='https://modelviewer.dev/shared-assets/models/Astronaut.glb'">Astronaut (Test)</div>
            <div class="model-item">Vlastný model...</div>
        </aside>

        <main class="main-content">
            <div class="viewer-box">
                <model-viewer id="viewer" src="" camera-controls auto-rotate shadow-intensity="1"></model-viewer>
            </div>

            <div class="controls">
                <div class="upload-wrapper">
                    <uc-config
                        ctx-name="my-uploader"
                        use-cloud-image-editor="false"
                        source-list="local"
                        pubkey="2113eada7cd60c81c6dc"
                    ></uc-config>

                    <uc-file-uploader-minimal ctx-name="my-uploader"></uc-file-uploader-minimal>
                    <uc-upload-ctx-provider id="ctx-provider" ctx-name="my-uploader"></uc-upload-ctx-provider>
                </div>

                <div class="action-box">
                    <input type="email" id="email" placeholder="Tvoj e-mail">
                    <button id="sendBtn" class="btn-send">ODOSLAŤ NA DISCORD</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // SEM DAJ SVOJ DISCORD LINK
        const DISCORD_URL = "https://discord.com/api/webhooks/1494401052605284552/KsxGcDjMXQZcAgZafiTlXkgQmYbfC61AAha0nQ5h2rqJPIL7waUlqlIpeM8HkaHmpvBR";

        const ctxProvider = document.getElementById('ctx-provider');
        const viewer = document.getElementById('viewer');
        const sendBtn = document.getElementById('sendBtn');
        
        let uploadedFile = null;

        // POČÚVAME NA DOKONČENIE NAHRÁVANIA (Pre nový Minimal Uploader)
        ctxProvider.addEventListener('common-upload-success', (e) => {
            // e.detail obsahuje zoznam nahratých súborov
            uploadedFile = e.detail;
            console.log("Súbor úspešne nahratý:", uploadedFile);
            
            // Ak je to GLB, ukážeme ho v náhľade
            if (uploadedFile.name.toLowerCase().endsWith('.glb')) {
                viewer.src = uploadedFile.cdnUrl;
            }
        });

        // ODOSIELANIE NA DISCORD
        sendBtn.onclick = async () => {
            const email = document.getElementById('email').value;

            if (!email.includes('@')) return alert("Zadaj e-mail!");
            if (!uploadedFile) return alert("Najprv nahraj súbor cez políčko!");

            sendBtn.disabled = true;
            sendBtn.innerText = "⏳ Posielam...";

            const message = {
                content: `🚀 **NOVÁ OBJEDNÁVKA**\n**Zákazník:** \`${email}\`\n**Model:** \`${uploadedFile.name}\`\n**Link:** ${uploadedFile.cdnUrl}`
            };

            try {
                const response = await fetch(DISCORD_URL, {
                    method: "POST",
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(message)
                });

                if (response.ok) {
                    alert("✅ Objednávka bola odoslaná na Discord!");
                    location.reload();
                } else {
                    alert("❌ Chyba pri komunikácii s Discordom.");
                    sendBtn.disabled = false;
                }
            } catch (err) {
                alert("❌ Chyba siete.");
                sendBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
