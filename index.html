<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D HUB SK | Profi Tlač</title>
    
    <script src="https://ucarecdn.com/libs/widget/3.x/uploadcare.full.min.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        :root { --primary: #5865F2; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: white; display: flex; flex-direction: column; height: 100vh; }
        
        header { padding: 1.5rem 2rem; background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
        h1 { margin: 0; font-size: 1.2rem; letter-spacing: 2px; color: var(--primary); }

        .main { flex: 1; display: flex; padding: 20px; gap: 20px; overflow: hidden; }
        
        /* 3D Náhľad */
        .preview-box { flex: 2; background: var(--card); border-radius: 20px; position: relative; overflow: hidden; border: 1px solid #334155; }
        model-viewer { width: 100%; height: 100%; background: radial-gradient(#334155, #0f172a); }

        /* Ovládací panel */
        .controls { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        
        /* TVOJ PÔVODNÝ DESIGN POLÍČKA */
        .drop-zone {
            flex: 1; border: 2px dashed #475569; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: var(--card); cursor: pointer; transition: 0.3s; padding: 20px; text-align: center;
        }
        .drop-zone:hover { border-color: var(--primary); background: #1e2945; }
        .drop-zone p { color: #94a3b8; font-size: 0.9rem; }

        input[type="email"] {
            background: #0f172a; border: 1px solid #334155; padding: 15px;
            border-radius: 12px; color: white; font-size: 1rem; outline: none;
        }
        input[type="email"]:focus { border-color: var(--primary); }

        .btn-send {
            background: var(--primary); color: white; border: none; padding: 18px;
            border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-send:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-send:disabled { background: #475569; cursor: not-allowed; }

        /* SKRYTIE UPLOADCARE WIDGETU */
        .uploadcare--widget { display: none !important; }
    </style>
</head>
<body>

    <header>
        <h1>3D HUB SK</h1>
        <div id="status-tag" style="font-size: 0.8rem; opacity: 0.6;">READY TO PRINT</div>
    </header>

    <div class="main">
        <div class="preview-box">
            <model-viewer id="viewer" src="" camera-controls auto-rotate shadow-intensity="1"></model-viewer>
        </div>

        <div class="controls">
            <div class="drop-zone" id="custom-drop">
                <div id="icon" style="font-size: 2rem; margin-bottom: 10px;">📦</div>
                <p id="file-name">Potiahni sem model<br><span style="font-size: 0.7rem;">(GLB, STL, 3MF)</span></p>
            </div>

            <input type="email" id="user-email" placeholder="Tvoj kontaktný e-mail">
            
            <input type="hidden" role="uploadcare-uploader" id="real-uploader" 
                   data-public-key="2113eada7cd60c81c6dc" 
                   data-tabs="file">

            <button id="send-btn" class="btn-send">ODOSLAŤ OBJEDNÁVKU</button>
        </div>
    </div>

    <script>
        const DISCORD_URL = "https://discord.com/api/webhooks/1494401052605284552/KsxGcDjMXQZcAgZafiTlXkgQmYbfC61AAha0nQ5h2rqJPIL7waUlqlIpeM8HkaHmpvBR";
        
        const customDrop = document.getElementById('custom-drop');
        const fileNameText = document.getElementById('file-name');
        const btn = document.getElementById('send-btn');
        const viewer = document.getElementById('viewer');
        
        // Získame prístup k Uploadcare "na pozadí"
        const widget = uploadcare.Widget('#real-uploader');

        // Keď niekto klikne na tvoje políčko, otvorí sa nahrávanie
        customDrop.onclick = () => {
            document.querySelector('.uploadcare--widget__button_type_open').click();
        };

        // Keď sa súbor vyberie/nahrá
        widget.onUploadComplete((info) => {
            console.log("Súbor nahratý:", info);
            fileNameText.innerHTML = `<b style="color:#10b981">PRIPRAVENÉ:</b><br>${info.name}`;
            
            // Ak je to GLB, ukážeme náhľad
            if (info.name.toLowerCase().endsWith('.glb')) {
                viewer.src = info.originalUrl;
            }
        });

        btn.onclick = async () => {
            const email = document.getElementById('user-email').value;
            const fileInfo = widget.value();

            if (!email.includes('@')) return alert("Zadaj email!");
            if (!fileInfo) return alert("Najprv nahraj súbor!");

            btn.disabled = true;
            btn.innerText = "ODOSIELAM...";

            fileInfo.done(async (info) => {
                const message = {
                    content: `🚀 **NOVÁ OBJEDNÁVKA**\n**Email:** \`${email}\`\n**Súbor:** \`${info.name}\`\n**Veľkosť:** ${(info.size/1024/1024).toFixed(2)} MB\n**Link:** ${info.originalUrl}`
                };

                await fetch(DISCORD_URL, {
                    method: "POST",
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(message)
                });

                alert("✅ Objednávka bola odoslaná!");
                location.reload();
            });
        };
    </script>
</body>
</html>
