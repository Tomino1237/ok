<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>3D HUB SK - Fix</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .box { background: white; padding: 30px; border-radius: 15px; max-width: 500px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #viewer { width: 100%; height: 300px; background: #eee; border-radius: 10px; margin-bottom: 15px; }
        .drop-zone { border: 3px dashed #ccc; padding: 20px; cursor: pointer; margin-bottom: 15px; }
        .btn { background: #5865F2; color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn:disabled { background: #ccc; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Odoslať 3D model</h2>
        <model-viewer id="viewer" camera-controls auto-rotate></model-viewer>
        
        <div class="drop-zone" id="dropZone">
            <p id="status">Klikni alebo sem hoď .glb súbor</p>
            <input type="file" id="fileInput" style="display: none;">
        </div>

        <input type="email" id="email" placeholder="Tvoj e-mail" style="width:100%; padding:10px; margin-bottom:15px; box-sizing:border-box;">
        <button id="sendBtn" class="btn">ODOSLAŤ NA DISCORD</button>
    </div>

    <script>
        const DISCORD_URL = "https://discord.com/api/webhooks/1494401052605284552/KsxGcDjMXQZcAgZafiTlXkgQmYbfC61AAha0nQ5h2rqJPIL7waUlqlIpeM8HkaHmpvBR"; 

        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const viewer = document.getElementById('viewer');
        const status = document.getElementById('status');
        const sendBtn = document.getElementById('sendBtn');
        let selectedFile = null;

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            if (!file) return;
            selectedFile = file;
            status.innerText = "Vybraté: " + file.name;
            if (file.name.endsWith('.glb')) {
                viewer.src = URL.createObjectURL(file);
            }
        }

        sendBtn.onclick = async () => {
            const email = document.getElementById('email').value;
            if (!selectedFile || !email.includes('@')) return alert("Vyber súbor a zadaj e-mail!");

            sendBtn.disabled = true;
            sendBtn.innerText = "Odosielam...";

            const formData = new FormData();
            // Discord vyžaduje payload_json pre textovú časť
            const payload = {
                content: `🚀 **Nová objednávka!**\n**Email:** ${email}\n**Súbor:** ${selectedFile.name}`
            };

            formData.append("payload_json", JSON.stringify(payload));
            formData.append("file", selectedFile, selectedFile.name);

            try {
                const response = await fetch(DISCORD_URL, {
                    method: "POST",
                    body: formData
                    // ŽIADNE HEADERS! Prehliadač ich spraví sám správne.
                });

                if (response.ok) {
                    alert("✅ Úspešne odoslané na Discord!");
                    location.reload();
                } else {
                    const errText = await response.text();
                    console.error(errText);
                    alert("❌ Discord zamietol súbor. Skús menší alebo iný formát.");
                }
            } catch (err) {
                alert("❌ Chyba siete.");
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerText = "ODOSLAŤ NA DISCORD";
            }
        };
    </script>
</body>
</html>
